<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏎️ Garaje Rápidos y Furiosos</title>
    <!-- Bootstrap CSS con integridad (seguridad) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Algo de estilo personalizado para mejorar la apariencia de las tarjetas -->
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-title {
            color: #1a1e24;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            border-bottom: 3px solid #e63946;
            display: inline-block;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .vehicle-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .vehicle-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .vehicle-img {
            height: 200px;
            object-fit: cover;
            background-color: #e9ecef;
        }
        .price-badge {
            background-color: #e63946;
            color: white;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        .driver-info {
            background-color: #f1f3f5;
            padding: 8px 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-style: italic;
            border-left: 4px solid #e63946;
        }
        .form-container {
            background-color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }
        .btn-danger-custom {
            background-color: #e63946;
            border-color: #e63946;
        }
        .btn-danger-custom:hover {
            background-color: #c1121f;
            border-color: #c1121f;
        }
        .empty-garage {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-size: 1.2rem;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="p-4">

    <div class="container">
        <!-- Encabezado con estilo "Fast & Furious" -->
        <div class="text-center mb-4">
            <h1 class="header-title">
                <span style="color: #e63946;">🏁</span> GARAJE RÁPIDOS Y FURIOSOS <span style="color: #e63946;">🏁</span>
            </h1>
            <p class="lead text-muted">Registro de vehículos de misiones especiales - Dominic Toretto te lo agradece</p>
        </div>

        <!-- Formulario para agregar vehículos -->
        <div class="form-container">
            <h3 class="mb-4"><span style="color: #e63946;">➕</span> Agregar nuevo vehículo</h3>
            <form id="vehicleForm">
                <div class="row g-3">
                    <!-- Fila 1: Marca, Modelo, Color -->
                    <div class="col-md-4">
                        <label for="brand" class="form-label fw-bold">Marca</label>
                        <input type="text" class="form-control" id="brand" placeholder="Ej: Dodge" required>
                    </div>
                    <div class="col-md-4">
                        <label for="model" class="form-label fw-bold">Modelo</label>
                        <input type="text" class="form-control" id="model" placeholder="Ej: Charger R/T" required>
                    </div>
                    <div class="col-md-4">
                        <label for="color" class="form-label fw-bold">Color</label>
                        <input type="text" class="form-control" id="color" placeholder="Ej: Negro mate" required>
                    </div>
                    
                    <!-- Fila 2: Foto (URL), Precio, Último Chofer -->
                    <div class="col-md-4">
                        <label for="photo" class="form-label fw-bold">Foto (URL)</label>
                        <input type="url" class="form-control" id="photo" placeholder="https://ejemplo.com/imagen.jpg" required>
                        <div class="form-text">URL de una imagen del vehículo</div>
                    </div>
                    <div class="col-md-4">
                        <label for="price" class="form-label fw-bold">Precio ($)</label>
                        <input type="number" class="form-control" id="price" placeholder="Ej: 50000" min="0" step="0.01" required>
                    </div>
                    <div class="col-md-4">
                        <label for="driver" class="form-label fw-bold">Último Chofer</label>
                        <input type="text" class="form-control" id="driver" placeholder="Ej: Dominic Toretto" required>
                    </div>
                    
                    <!-- Botón de envío -->
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-danger-custom btn-lg w-100">
                            <span style="font-size: 1.2rem;">🚗</span> AGREGAR VEHÍCULO AL GARAJE <span style="font-size: 1.2rem;">🏎️</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Listado de vehículos (se actualiza dinámicamente) -->
        <div class="mt-5">
            <h2 class="mb-4" style="color: #1a1e24;">
                <span style="background-color: #e63946; color: white; padding: 5px 15px; border-radius: 30px;">📋 VEHÍCULOS EN EL GARAJE</span>
            </h2>
            
            <!-- Contenedor donde se mostrarán las tarjetas -->
            <div id="vehicleList" class="row g-4">
                <!-- Aquí JavaScript insertará los vehículos -->
                <div class="empty-garage">
                    <p style="font-size: 1.5rem;">🏁 El garaje está vacío...</p>
                    <p>¡Agrega tu primer vehículo usando el formulario de arriba!</p>
                    <img src="https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif?cid=790b7611p678u78s0k8vz3x5q5x5q5x5q5x5q5x5q5x5q5&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Fast and Furious empty garage" style="max-width: 200px; border-radius: 10px; margin-top: 20px;">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (opcional para algunos componentes, pero lo incluimos por si acaso) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    
    <!-- JavaScript para la funcionalidad del formulario -->
    <script>
        // Esperamos a que el DOM esté completamente cargado
        document.addEventListener('DOMContentLoaded', function() {
            
            // Referencias a elementos del DOM
            const form = document.getElementById('vehicleForm');
            const vehicleList = document.getElementById('vehicleList');
            
            // Array para almacenar los vehículos (empezamos vacío)
            let vehicles = [];
            
            // Función para renderizar los vehículos en el listado
            function renderVehicles() {
                // Limpiar el contenedor
                vehicleList.innerHTML = '';
                
                // Si no hay vehículos, mostrar mensaje de garaje vacío
                if (vehicles.length === 0) {
                    vehicleList.innerHTML = `
                        <div class="empty-garage">
                            <p style="font-size: 1.5rem;">🏁 El garaje está vacío...</p>
                            <p>¡Agrega tu primer vehículo usando el formulario de arriba!</p>
                            <img src="https://media.giphy.com/media/3o7abB06u9bNzA8LC8/giphy.gif?cid=790b7611p678u78s0k8vz3x5q5x5q5x5q5x5q5x5q5x5q5&ep=v1_gifs_search&rid=giphy.gif&ct=g" alt="Fast and Furious empty garage" style="max-width: 200px; border-radius: 10px; margin-top: 20px;">
                        </div>
                    `;
                    return;
                }
                
                // Recorremos todos los vehículos y creamos sus tarjetas
                vehicles.forEach((vehicle, index) => {
                    // Crear columna para la tarjeta (grid de Bootstrap: 1 tarjeta en móvil, 2 en tablet, 3 en desktop)
                    const col = document.createElement('div');
                    col.className = 'col-12 col-md-6 col-lg-4';
                    
                    // Crear la tarjeta con los datos del vehículo
                    col.innerHTML = `
                        <div class="card vehicle-card h-100">
                            <img src="${vehicle.photo}" class="card-img-top vehicle-img" alt="${vehicle.brand} ${vehicle.model}" onerror="this.src='https://via.placeholder.com/300x200?text=Sin+Foto'">
                            <div class="card-body">
                                <h5 class="card-title fw-bold">${vehicle.brand} ${vehicle.model}</h5>
                                <div class="mb-2">
                                    <span class="badge" style="background-color: ${getColorBadge(vehicle.color)}; color: white;">${vehicle.color}</span>
                                </div>
                                <p class="card-text">
                                    <strong>Color:</strong> ${vehicle.color}<br>
                                    <span class="price-badge">💰 $${formatPrice(vehicle.price)}</span>
                                </p>
                                <div class="driver-info">
                                    <strong>👤 Último chofer:</strong> ${vehicle.driver}
                                </div>
                            </div>
                        </div>
                    `;
                    
                    vehicleList.appendChild(col);
                });
            }
            
            // Función auxiliar para formatear precio (agregar comas)
            function formatPrice(price) {
                return parseFloat(price).toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            }
            
            // Función auxiliar para asignar color de badge según el color del vehículo (para que se vea bonito)
            function getColorBadge(color) {
                // Colores comunes en inglés o español, convertimos a minúsculas para comparar
                const colorLower = color.toLowerCase();
                
                if (colorLower.includes('negro') || colorLower.includes('black')) return '#212529';
                if (colorLower.includes('blanco') || colorLower.includes('white')) return '#f8f9fa';
                if (colorLower.includes('rojo') || colorLower.includes('red')) return '#dc3545';
                if (colorLower.includes('azul') || colorLower.includes('blue')) return '#0d6efd';
                if (colorLower.includes('verde') || colorLower.includes('green')) return '#198754';
                if (colorLower.includes('amarillo') || colorLower.includes('yellow')) return '#ffc107';
                if (colorLower.includes('gris') || colorLower.includes('gray') || colorLower.includes('grey')) return '#6c757d';
                
                return '#6c757d'; // gris por defecto
            }
            
            // Manejar el envío del formulario
            form.addEventListener('submit', function(e) {
                e.preventDefault(); // Evitar recargar la página
                
                // Obtener valores del formulario
                const brand = document.getElementById('brand').value.trim();
                const model = document.getElementById('model').value.trim();
                const color = document.getElementById('color').value.trim();
                const photo = document.getElementById('photo').value.trim();
                const price = document.getElementById('price').value.trim();
                const driver = document.getElementById('driver').value.trim();
                
                // Validación básica (todos los campos son requeridos por HTML5, pero por si acaso)
                if (!brand || !model || !color || !photo || !price || !driver) {
                    alert('Por favor, completa todos los campos.');
                    return;
                }
                
                // Crear objeto vehículo
                const newVehicle = {
                    brand: brand,
                    model: model,
                    color: color,
                    photo: photo,
                    price: price,
                    driver: driver
                };
                
                // Agregar al array
                vehicles.push(newVehicle);
                
                // Actualizar el listado
                renderVehicles();
                
                // Limpiar el formulario
                form.reset();
                
                // Opcional: Enfocar el primer campo para seguir agregando
                document.getElementById('brand').focus();
                
                // Pequeño detalle: Mostrar mensaje de éxito (opcional)
                console.log('Vehículo agregado:', newVehicle);
            });
            
            // Inicializar con algunos vehículos de ejemplo (opcional, para que no esté vacío al principio)
            // Comentado para que empiece vacío como pide la tarea, pero si quieres datos de ejemplo, descomenta:
            /*
            vehicles = [
                {
                    brand: 'Dodge',
                    model: 'Charger R/T',
                    color: 'Negro mate',
                    photo: 'https://www.motortrend.com/uploads/sites/5/2020/06/1970-Dodge-Charger-500-front-three-quarter-02.jpg?fit=around%7C875:492',
                    price: '75000',
                    driver: 'Dominic Toretto'
                },
                {
                    brand: 'Nissan',
                    model: 'Skyline GT-R R34',
                    color: 'Azul Bayside',
                    photo: 'https://www.topgear.com/sites/default/files/cars-car/image/2018/12/1%20nissan%20skyline%20gtr%20r34%20front.jpg',
                    price: '120000',
                    driver: 'Brian O\'Conner'
                },
                {
                    brand: 'Mazda',
                    model: 'RX-7 FD',
                    color: 'Naranja',
                    photo: 'https://cdn.motor1.com/images/mgl/0Z2ZP/s1/veilside-mazda-rx-7-fd3s.jpg',
                    price: '45000',
                    driver: 'Han Seoul-Oh'
                }
            ];
            renderVehicles();
            */
        });
    </script>
</body>
</html>

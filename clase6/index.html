<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage F & F</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        #iColor{
            width: 100%;
        }
    </style>
</head>
<body>
    
    <div class="mt-5 container">

        <h1>

             <i class="fa-solid fa-truck-field"></i>
             Garaje Rapidos y Furiosos
        </h1>

        <div class="mt-3">      
            
            <h3>Agregar Vehiculo</h3>

            <div class="row">
                <div class="col">
                    <input class="form-control m-3" id="iMarca" type="text" placeholder="Marca"/>
                    <input class="form-control m-3" id="iModelo" type="text" placeholder="Modelo"/>
                    
                    <div class="input-group m-3">
                        <span class="input-group-text" id="basic-addon1">Color</span>
                        <div class="form-control">
                            <input type="color" id="iColor"  placeholder="Color"  >
                        </div>
                    </div>


                </div>
                <div class="col">
                    <div class="input-group m-3">
                        <span class="input-group-text" id="basic-addon1">Precio</span>
                        
                            <input class="form-control" type="number" id="iPrecio"  placeholder="USD"  >
                        
                    </div>

                     <div class="input-group m-3">
                        <span class="input-group-text" id="basic-addon1">Foto</span>
                        
                            <input class="form-control" type="text" id="iFoto"  placeholder="Url a la foto"  >
                        
                    </div>

                </div>

            </div>

            <div class="text-center">
                <button onclick="guardarVehiculo();" class="btn btn-success"><i class="fa fa-save"></i> Guardar</button>
            </div>

        </div>

        <div class="mt-3">
            <h3>Listado de Vehiculo</h3>
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Color</th>
                        <th>Foto</th>
                        <th>Precio</th>
                    </tr>
                </thead>
                <tbody id="tbListado">
                  
                </tbody>

            </table>

        </div>

    </div>
    <script>

        var vehiculos = [];

        function guardarVehiculo(){

            let vehiculo = {};
            vehiculo.marca = document.getElementById('iMarca').value;

            vehiculo.modelo = document.getElementById('iModelo').value;
            vehiculo.color = document.getElementById('iColor').value;
            vehiculo.foto = document.getElementById('iFoto').value;
            vehiculo.precio = document.getElementById('iPrecio').value;

            if(vehiculo.marca.length < 2){
             
                Swal.fire({
                title: "Fantan datos",
                text: "DOM necesita la marca",
                icon: "error"
                });
                return false;
            }

             if(vehiculo.precio.length < 2){
             
                Swal.fire({
                title: "Fantan datos",
                text: "DOM necesita el precio",
                icon: "error"
                });
                return false;
            }

            vehiculos.push(vehiculo);

            Swal.fire("Vehiculo Agregado");

            mostrarVehiculos();
            limpiarCampos();
        }

        function mostrarVehiculos(){
            let destino = document.getElementById('tbListado');
            destino.innerHTML = '';

            

            for(x =0; x < vehiculos.length; x++){
                var vh = vehiculos[x];
                let tr = document.createElement('tr');
                tr.innerHTML = `<tr>
                            <td>${vh.marca}</td>
                            <td>${vh.modelo}</td>
                            <td>${vh.color}</td>
                            <td><img src="${vh.foto}"/></td>
                            <td>${vh.precio}</td>
                        </tr>`;

              



                destino.appendChild(tr);
            }

        }

        function limpiarCampos(){
            document.getElementById('iMarca').value = '';
        }
    </script>
</body>
</html>
